<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Essentials | Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #cart-section { margin-top: 50px; padding: 20px; border-top: 2px solid #eee }
        .cart-item { background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-radius: 5px }
    </style>
</head>
<body>

<nav>
    <div class="logo">AURA.</div>
</nav>

<div class="container">
    <div id="grid">
        <div class="card">
            <div class="image-placeholder">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTsfc_j-AdJhYQPXLocPvka0IBx_cgUclHDlA&s" alt="">
            </div>
            <div class="content">
                <div class="category">Fruit</div>
                <h3 class="title">Strawberry</h3>
                <p class="price">$5.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
        
        <div class="card">
            <div class="image-placeholder">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREZGB0lm9o9ZLOzBJ23i_LJMm5Ed9Llfbezg&s" alt="">
            </div>
            <div class="content">
                <div class="category">Vegetable</div>
                <h3 class="title">Tomato</h3>
                <p class="price">$5.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <div class="image-placeholder">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnlrPIEqTWTlxd8qaZzLTpdt8jYNrgJT25oA&s" alt="">
            </div>
            <div class="content">
                <div class="category">Fruit</div>
                <h3 class="title">Banana</h3>
                <p class="price">$2.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
    </div>

    <div id="cart-section">
        <h2>თქვენი კალათა</h2>
        <div id="cart-items">
            <p>კალათა ცარიელია...</p>
        </div>
    </div>
</div>

    <script type="module" src="./script.js"></script>
</body>
</html>
